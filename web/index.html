<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trading Memory Engine</title><style>
:root{--bg:#07111f;--panel:#0d1b2a;--line:#20364e;--text:#dbe9f6;--muted:#7890a8;--green:#38d996;--amber:#ffbe55}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 70% -10%,#173659,transparent 40%),var(--bg);color:var(--text);font:14px Inter,system-ui}main{max-width:1300px;margin:auto;padding:28px}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}h1{font-size:24px;margin:0;letter-spacing:.04em}.badge{border:1px solid #1a714e;color:var(--green);padding:7px 12px;border-radius:20px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:linear-gradient(145deg,#102238,#0b1725);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:0 12px 30px #0003}.label{color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.1em}.value{font-size:21px;margin-top:8px}.wide{grid-column:span 2}section{margin-top:16px}table{width:100%;border-collapse:collapse;margin-top:12px}th,td{text-align:left;padding:10px;border-bottom:1px solid var(--line)}th{color:var(--muted);font-size:11px;text-transform:uppercase}.tabs button{background:none;color:var(--muted);border:0;padding:10px 14px;cursor:pointer}.tabs button.on{color:var(--green);border-bottom:2px solid var(--green)}input,select{background:#081420;border:1px solid var(--line);color:var(--text);padding:9px;border-radius:6px;margin:8px 5px 8px 0}pre{max-height:390px;overflow:auto;color:#a9c6df;white-space:pre-wrap}.ok{color:var(--green)}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.wide{grid-column:span 2}}
</style></head><body><main><div class="head"><div><div class="label">Independent data platform</div><h1>TRADING MEMORY ENGINE</h1></div><div class="badge">● LIVE</div></div>
<div class="grid"><div class="card"><div class="label">Wallets</div><div class="value" id="walletCount">—</div></div><div class="card"><div class="label">Dominant Coin</div><div class="value" id="dominant">—</div></div><div class="card"><div class="label">Most Active</div><div class="value" id="active">—</div></div><div class="card"><div class="label">Largest Exposure</div><div class="value" id="exposure">—</div></div></div>
<section class="card"><div class="tabs"><button class="on" onclick="tab('wallets',this)">WALLETS</button><button onclick="tab('raw',this)">RAW EXPLORER</button></div><div id="wallets"><table><thead><tr><th>Wallet</th><th>Status</th><th>Recovery</th><th>Capital</th><th>Positions</th><th>Last fill</th></tr></thead><tbody id="walletRows"></tbody></table></div>
<div id="raw" hidden><input id="rw" placeholder="Wallet address"><input id="rc" placeholder="Coin (optional)"><input id="rl" type="number" placeholder="Lifecycle"><button onclick="loadRaw()">Explore</button><pre id="rawOut">Select wallet → coin → lifecycle</pre></div></section>
</main><script>
const short=x=>x?x.slice(0,6)+'…'+x.slice(-4):'—';async function refresh(){let r=await fetch('/v1/report').then(x=>x.json());walletCount.textContent=r.wallets.length;dominant.textContent=r.market.dominant_coin||'—';active.textContent=short(r.market.most_active_wallet);exposure.textContent=r.market.largest_exposure?`${r.market.largest_exposure.coin} · ${r.market.largest_exposure.capital}`:'—';walletRows.innerHTML=r.wallets.map(w=>`<tr><td>${short(w.address)}<br><span class="label">${w.label}</span></td><td class="ok">${w.status}</td><td>${w.recovery_status}</td><td>${w.capital}</td><td>${w.current_positions}</td><td>${w.last_fill_ms?new Date(w.last_fill_ms).toLocaleString():'—'}</td></tr>`).join('')}function tab(id,b){wallets.hidden=id!='wallets';raw.hidden=id!='raw';document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on')}async function loadRaw(){let q=new URLSearchParams();if(rc.value)q.set('coin',rc.value);if(rl.value)q.set('lifecycle',rl.value);let r=await fetch('/v1/raw/'+rw.value+'?'+q).then(x=>x.json());rawOut.textContent=JSON.stringify(r,null,2)}refresh();setInterval(refresh,3000)
</script></body></html>
